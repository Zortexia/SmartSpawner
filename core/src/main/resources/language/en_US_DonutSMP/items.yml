# SmartSpawner – items.yml
# Spawner item display names and drop item names.

# Appearance of smart spawner items in inventory and tooltips
# Available placeholders: {entity}, {ᴇɴᴛɪᴛʏ}, {exp}, {loot_items}, {amount}, {item_name}, {chance}
smart_spawner:
  default:
    name: '&#5DB5F1{entity} Spawner'
    loot_items: '  &#ecf0f1 • {amount} {item_name} &#3498db({chance}%)'
    loot_items_empty: '  &#ecf0f1 •  None'
    lore:
      - ''
      - ' &#5DB5F1 ᴅᴇᴛᴀɪʟ:'
      - '  &#ecf0f1 • &fEXP give: &a{exp}'
      - ''
      - ' &#5DB5F1 ᴅʀᴏᴘꜱ:'
      - '{loot_items}'
      - ''
  # Entity-specific sections override default per key. Unspecified keys use default.
  PIG:
    name: '&#FF77B7{entity} Spawner'
    loot_items: '  &#FFF0F7 • {amount} {item_name} &#FF8FC7({chance}%)'
    loot_items_empty: '  &#FFF0F7 •  None'
    lore:
      - ''
      - ' &#FF77B7 ᴅᴇᴛᴀɪʟ:'
      - '  &#FFF0F7 • &fEXP give: &#FF8FC7{exp}'
      - ''
      - ' &#FF77B7 ᴅʀᴏᴘꜱ:'
      - '{loot_items}'
      - ''
  BLAZE:
    name: '&#FFB300{entity} Spawner'
    loot_items: '  &#FFF4CC • {amount} {item_name} &#FFC107({chance}%)'
    loot_items_empty: '  &#FFF4CC •  None'
    lore:
      - ''
      - ' &#FFB300 ᴅᴇᴛᴀɪʟ:'
      - '  &#FFF4CC • &fEXP give: &#FFD54F{exp}'
      - ''
      - ' &#FFB300 ᴅʀᴏᴘꜱ:'
      - '{loot_items}'
      - ''

